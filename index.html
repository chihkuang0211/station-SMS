<style>
  :root{
    --ink:#1c1f1a;
    --paper:#f6f5ef;
    --line:#d8d6cb;
    --rust:#b5532b;
    --moss:#5c6b4f;
    --moss-dim:#8a9580;
    --card:#ffffff;
    --mono: "JetBrains Mono", "Consolas", monospace;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  header{
    padding:18px 16px 14px;
    border-bottom:2px solid var(--ink);
    position:sticky; top:0; background:var(--paper); z-index:10;
  }
  header h1{
    margin:0;
    font-size:1.25rem;
    letter-spacing:0.06em;
    font-weight:800;
  }
  header h1 .acc{ color:var(--rust); }
  header .sub{
    margin-top:4px;
    font-size:0.75rem;
    color:var(--moss-dim);
    font-family:var(--mono);
    letter-spacing:0.04em;
  }
  header .credit{
    margin-top:2px;
    font-size:0.7rem;
    color:var(--moss-dim);
    font-family:var(--mono);
    letter-spacing:0.02em;
  }
  nav{
    display:flex;
    border-bottom:1px solid var(--line);
    background:var(--paper);
    position:sticky; top:58px; z-index:9;
  }
  nav button{
    flex:1;
    padding:10px 4px;
    border:none;
    background:none;
    font-family:var(--sans);
    font-size:0.85rem;
    font-weight:700;
    color:var(--moss-dim);
    border-bottom:3px solid transparent;
    cursor:pointer;
  }
  nav button.active{
    color:var(--ink);
    border-bottom-color:var(--rust);
  }
  main{ padding:14px 16px 60px; max-width:720px; margin:0 auto; }
  .panel{ display:none; }
  .panel.active{ display:block; }

  /* --- 新增紀錄 --- */
  textarea{
    width:100%;
    min-height:90px;
    font-family:var(--mono);
    font-size:0.85rem;
    padding:10px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--card);
    resize:vertical;
  }
  .btn{
    display:inline-block;
    padding:10px 18px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    font-weight:700;
    font-size:0.9rem;
    border-radius:4px;
    cursor:pointer;
    margin-top:8px;
  }
  .btn.outline{
    background:none;
    color:var(--ink);
    border-color:var(--ink);
  }
  .btn.rust{ background:var(--rust); border-color:var(--rust); }
  .btn.small{ padding:6px 12px; font-size:0.78rem; margin-top:0;}
  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center;}

  .preview{
    margin-top:10px;
    padding:10px;
    border:1px dashed var(--moss-dim);
    border-radius:4px;
    font-size:0.82rem;
    background:#fbfaf5;
    font-family:var(--mono);
    white-space:pre-wrap;
    line-height:1.6;
  }
  .preview b{ color:var(--moss); }
  .err{ color:var(--rust); font-weight:700; }

  /* --- 查詢 --- */
  input[type=text]{
    width:100%;
    padding:10px;
    font-size:0.95rem;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--card);
    font-family:var(--sans);
  }
  .station-list{ margin-top:14px; }
  .station-item{
    padding:12px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--card);
    margin-bottom:8px;
    cursor:pointer;
  }
  .station-item .name{ font-weight:800; font-size:1rem; }
  .station-item .meta{
    font-family:var(--mono); font-size:0.75rem; color:var(--moss-dim); margin-top:2px;
  }
  .station-item .count{
    display:inline-block;
    background:var(--moss);
    color:#fff;
    font-size:0.7rem;
    font-weight:700;
    padding:2px 7px;
    border-radius:10px;
    margin-left:6px;
  }

  /* --- 站詳細 --- */
  .station-header{
    display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:12px;
  }
  .station-header h2{ margin:0; font-size:1.15rem; }
  .station-header .code{ font-family:var(--mono); font-size:0.75rem; color:var(--moss-dim); }

  .timeline{ border-left:2px solid var(--line); padding-left:14px; margin-left:6px; }
  .record{ position:relative; margin-bottom:18px; }
  .record::before{
    content:""; position:absolute; left:-19px; top:4px;
    width:9px; height:9px; border-radius:50%;
    background:var(--rust); border:2px solid var(--paper);
  }
  .record .date{ font-family:var(--mono); font-weight:700; font-size:0.85rem; }
  .record .type{ font-size:0.75rem; color:var(--moss); font-weight:700; }
  .record .raw{
    font-family:var(--mono); font-size:0.78rem; color:#666;
    background:#fbfaf5; padding:6px 8px; border-radius:4px; margin-top:4px;
    white-space:pre-wrap; word-break:break-all;
  }
  .record .fix-label{ font-size:0.75rem; font-weight:700; color:var(--moss); margin-top:6px; display:block;}
  .record textarea.fix{
    margin-top:4px; min-height:130px; font-size:16px;
    resize:none; overflow:hidden;
    width:100%;
  }
  .record .saved-fix{
    margin-top:4px; padding:8px; background:#eef1ea; border-radius:4px;
    font-size:0.85rem; white-space:pre-wrap;
  }
  .record .actions{ margin-top:6px; }
  .record .del{
    color:var(--rust); background:none; border:none; font-size:0.75rem;
    text-decoration:underline; cursor:pointer; padding:4px 0;
  }

  /* --- 設定 --- */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-weight:700; font-size:0.85rem; margin-bottom:4px; }
  .hint{ font-size:0.78rem; color:var(--moss-dim); margin-top:4px; line-height:1.6;}
  .empty{
    text-align:center; padding:40px 10px; color:var(--moss-dim);
    font-family:var(--mono); font-size:0.85rem;
  }
</style>

<script>
const STORAGE_KEY = 'bts_fault_db_v1';
const FIX_TEMPLATE = `【故障現象】
【判斷依據】
【處理方式】
【更換物料】
【處理結果】
`;

// ---------- 資料層 ----------
function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { stations: {} };
  }catch(e){ return { stations: {} }; }
}
function saveDB(db){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}
let db = loadDB();

// ---------- 簡訊解析 ----------
// 4G 範例: 4G障礙派工03,X,97227000,0972031,97227LN1-中橫九曲洞,中橫九曲洞,湛開倫,06/12 07:21
//   欄位: 類型,X,站碼,站碼別名,站名代碼-站名,站名,派工人員,時間  (8欄)
// 5G 範例: 5G-障礙派工01,X,98114000,玉里觀音山,06/15 08:30,7116,BASE STATION SERVICE PROB
//   欄位: 類型,X,站碼,站名,時間,障礙編號,障礙描述  (7欄)
function parseLine(line){
  line = line.trim();
  if(!line) return null;
  const parts = line.split(',').map(s=>s.trim());
  if(parts.length < 7){
    return { error: '欄位數不足（4G需8欄/5G需7欄，目前 ' + parts.length + ' 欄）', raw: line };
  }

  const faultType = parts[0];
  const is5G = /5G/i.test(faultType);

  if(is5G){
    if(parts.length < 7){
      return { error: '5G格式欄位不足（需 7 欄，目前 ' + parts.length + ' 欄）', raw: line };
    }
    const [ , code2, siteCode, siteName, datetime, orderNo, description ] = parts;
    if(!siteName || !siteCode || !datetime){
      return { error: '缺少站名 / 站碼 / 時間', raw: line };
    }
    return {
      raw: line, network: '5G',
      faultType, code2, siteCode, siteName, datetime, orderNo, description,
      siteAlias: '', siteCodeName: '', worker: '',
      id: siteCode + '_' + datetime + '_' + faultType
    };
  }else{
    if(parts.length < 8){
      return { error: '4G格式欄位不足（需 8 欄，目前 ' + parts.length + ' 欄）', raw: line };
    }
    const [ , code2, siteCode, siteAlias, siteCodeName, siteName, worker, datetime] = parts;
    if(!siteName || !siteCode || !datetime){
      return { error: '缺少站名 / 站碼 / 時間', raw: line };
    }
    return {
      raw: line, network: '4G',
      faultType, code2, siteCode, siteAlias, siteCodeName, siteName, worker, datetime,
      orderNo: '', description: '',
      id: siteCode + '_' + datetime + '_' + faultType
    };
  }
}

// ---------- 新增 / 解析 ----------
const smsInput = document.getElementById('smsInput');
const previewBox = document.getElementById('previewBox');

document.getElementById('parseBtn').addEventListener('click', ()=>{
  const lines = smsInput.value.split('\n');
  const results = lines.map(parseLine).filter(r=>r!==null);
  if(results.length===0){
    previewBox.innerHTML = '<div class="preview err">沒有可解析的內容。</div>';
    return;
  }

  let html = '';
  let toSave = [];
  results.forEach(r=>{
    if(r.error){
      html += `<div class="preview err">⚠ ${r.error}<br>原始: ${escapeHtml(r.raw)}</div>`;
    }else{
      const extraInfo = r.network==='5G'
        ? `<b>障礙編號：</b>${escapeHtml(r.orderNo)}　<b>障礙描述：</b>${escapeHtml(r.description)}`
        : `<b>派工：</b>${escapeHtml(r.worker)}　<b>代碼站名：</b>${escapeHtml(r.siteCodeName)}`;
      html += `<div class="preview">
        <b>網路：</b>${escapeHtml(r.network)}　<b>站名：</b>${escapeHtml(r.siteName)}　<b>站碼：</b>${escapeHtml(r.siteCode)}${r.siteAlias?'（'+escapeHtml(r.siteAlias)+'）':''}
        <b>時間：</b>${escapeHtml(r.datetime)}
        <b>類型：</b>${escapeHtml(r.faultType)}
        ${extraInfo}
      </div>`;
      toSave.push(r);
    }
  });

  if(toSave.length>0){
    html += `<button class="btn" id="confirmSaveBtn">確認存入（${toSave.length} 筆）</button>`;
  }
  previewBox.innerHTML = html;

  const confirmBtn = document.getElementById('confirmSaveBtn');
  if(confirmBtn){
    confirmBtn.addEventListener('click', ()=>{
      let added=0, skipped=0;
      toSave.forEach(r=>{
        const key = r.siteName; // 主索引：站名
        if(!db.stations[key]){
          db.stations[key] = {
            siteName: r.siteName,
            siteCode: r.siteCode,
            siteAlias: r.siteAlias,
            siteCodeName: r.siteCodeName,
            records: []
          };
        }
        // 更新站碼資訊（4G資訊較完整，避免被5G空值覆蓋）
        db.stations[key].siteCode = r.siteCode || db.stations[key].siteCode;
        if(r.siteAlias) db.stations[key].siteAlias = r.siteAlias;
        if(r.siteCodeName) db.stations[key].siteCodeName = r.siteCodeName;

        const exists = db.stations[key].records.some(rec=>rec.id===r.id);
        if(exists){ skipped++; return; }
        db.stations[key].records.push({
          id: r.id,
          datetime: r.datetime,
          faultType: r.faultType,
          network: r.network,
          worker: r.worker || '',
          orderNo: r.orderNo || '',
          description: r.description || '',
          raw: r.raw,
          fix: ''
        });
        added++;
      });
      // 排序紀錄（新到舊，依字串時間粗略排序，月/日 視為同年）
      Object.values(db.stations).forEach(st=>{
        st.records.sort((a,b)=> compareDatetime(b.datetime, a.datetime));
      });
      saveDB(db);
      previewBox.innerHTML = `<div class="preview"><b>已存入 ${added} 筆</b>${skipped>0 ? '，略過重複 '+skipped+' 筆':''}。</div>`;
      smsInput.value='';
      renderStationList();
    });
  }
});

function compareDatetime(a,b){
  // 格式 MM/DD HH:MM -> 轉成可比較數字
  const toNum = s=>{
    const m = s.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
    if(!m) return 0;
    return parseInt(m[1])*1000000 + parseInt(m[2])*10000 + parseInt(m[3])*100 + parseInt(m[4]);
  };
  return toNum(a) - toNum(b);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

// ---------- 查詢 ----------
const searchBox = document.getElementById('searchBox');
const stationList = document.getElementById('stationList');
const detailView = document.getElementById('detailView');

searchBox.addEventListener('input', ()=>{
  detailView.innerHTML='';
  renderStationList(searchBox.value.trim());
});

function renderStationList(filter=''){
  stationList.style.display = '';
  const keys = Object.keys(db.stations);
  let filtered = keys;
  if(filter){
    const f = filter.toLowerCase();
    filtered = keys.filter(k=>{
      const st = db.stations[k];
      if(st.siteName.toLowerCase().includes(f)) return true;
      if(st.siteCode && st.siteCode.includes(f)) return true;
      if(st.siteAlias && st.siteAlias.includes(f)) return true;
      // 也搜尋紀錄內文 / 修復註記
      return st.records.some(r=>
        (r.raw && r.raw.toLowerCase().includes(f)) ||
        (r.fix && r.fix.toLowerCase().includes(f)) ||
        (r.orderNo && r.orderNo.toLowerCase().includes(f)) ||
        (r.description && r.description.toLowerCase().includes(f))
      );
    });
  }

  if(filtered.length===0){
    stationList.innerHTML = `<div class="empty">${keys.length===0 ? '尚無紀錄，請先到「新增」貼上派工簡訊' : '找不到符合的基站'}</div>`;
    return;
  }

  filtered.sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  stationList.innerHTML = filtered.map(k=>{
    const st = db.stations[k];
    const last = st.records[0];
    return `<div class="station-item" data-key="${escapeHtml(k)}">
      <span class="name">${escapeHtml(st.siteName)}</span>
      <span class="count">${st.records.length} 筆</span>
      <div class="meta">站碼 ${escapeHtml(st.siteCode||'')} ／ 最近：${last ? escapeHtml(last.datetime) : '-'}</div>
    </div>`;
  }).join('');

  stationList.querySelectorAll('.station-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      renderDetail(el.dataset.key);
    });
  });
}

function renderDetail(key){
  const st = db.stations[key];
  if(!st){ detailView.innerHTML=''; return; }

  let html = `<div class="station-header">
    <div>
      <h2>${escapeHtml(st.siteName)}</h2>
      <div class="code">${escapeHtml(st.siteCode||'')} ／ ${escapeHtml(st.siteCodeName||'')}</div>
    </div>
    <div class="row" style="gap:6px;">
      <button class="btn outline small" id="printDetailBtn">列印 PDF</button>
      <button class="btn outline small" id="closeDetailBtn">關閉</button>
    </div>
  </div>`;

  html += '<div class="timeline">';
  st.records.forEach((r,idx)=>{
    const netTag = r.network ? `<span style="display:inline-block;font-size:0.65rem;font-weight:800;padding:1px 6px;border-radius:3px;margin-right:6px;background:${r.network==='5G'?'var(--rust)':'var(--moss)'};color:#fff;">${escapeHtml(r.network)}</span>` : '';
    const metaLine = r.network==='5G'
      ? `障礙編號：${escapeHtml(r.orderNo||'-')} ／ ${escapeHtml(r.description||'')}`
      : `派工：${escapeHtml(r.worker||'-')}`;
    html += `<div class="record" data-key="${escapeHtml(key)}" data-idx="${idx}">
      <div class="date">${netTag}${escapeHtml(r.datetime)}</div>
      <div class="type">${escapeHtml(r.faultType)} ／ ${metaLine}</div>
      <div class="raw">${escapeHtml(r.raw)}</div>
      ${r.fix
        ? `<div class="saved-fix">${escapeHtml(r.fix)}</div>
           <div class="actions"><button class="btn outline small edit-fix">編輯修復方式</button></div>`
        : `<span class="fix-label">修復方式（選填）</span>
           <textarea class="fix">${FIX_TEMPLATE}</textarea>
           <div class="actions"><button class="btn small save-fix">儲存</button></div>`
      }
      <div class="actions"><button class="del">刪除這筆紀錄</button></div>
    </div>`;
  });
  html += '</div>';

  detailView.innerHTML = html;
  stationList.style.display = 'none';
  document.querySelector('header .sub').dataset.prev = '';

  // 自動調整修復方式欄位高度
  detailView.querySelectorAll('textarea.fix').forEach(ta=>{
    autoResize(ta);
    ta.addEventListener('input', ()=>autoResize(ta));
  });

  document.getElementById('closeDetailBtn').addEventListener('click', ()=>{
    detailView.innerHTML='';
    stationList.style.display='';
  });

  document.getElementById('printDetailBtn').addEventListener('click', ()=>{
    printStation(key);
  });

  detailView.querySelectorAll('.save-fix').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const recDiv = e.target.closest('.record');
      const idx = parseInt(recDiv.dataset.idx);
      const ta = recDiv.querySelector('textarea.fix');
      st.records[idx].fix = ta.value.trim();
      saveDB(db);
      renderDetail(key);
    });
  });

  detailView.querySelectorAll('.edit-fix').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const recDiv = e.target.closest('.record');
      const idx = parseInt(recDiv.dataset.idx);
      const current = st.records[idx].fix;
      st.records[idx].fix = '';
      saveDB(db);
      renderDetail(key);
      // restore into textarea after re-render
      setTimeout(()=>{
        const newRec = detailView.querySelector(`.record[data-idx="${idx}"] textarea.fix`);
        if(newRec){
          newRec.value = current;
          autoResize(newRec);
        }
      },0);
    });
  });

  detailView.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const recDiv = e.target.closest('.record');
      const idx = parseInt(recDiv.dataset.idx);
      if(confirm('確定刪除這筆紀錄？')){
        st.records.splice(idx,1);
        if(st.records.length===0){
          delete db.stations[key];
          saveDB(db);
          detailView.innerHTML='';
          stationList.style.display='';
          renderStationList(searchBox.value.trim());
          return;
        }
        saveDB(db);
        renderDetail(key);
      }
    });
  });
}

// ---------- 列印 PDF ----------
function printStation(key){
  const st = db.stations[key];
  if(!st) return;

  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const printedAt = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  let rowsHtml = '';
  st.records.forEach((r,i)=>{
    const netTag = r.network ? `[${r.network}] ` : '';
    const metaLine = r.network==='5G'
      ? `障礙編號：${r.orderNo||'-'} ／ 障礙描述：${r.description||'-'}`
      : `派工人員：${r.worker||'-'}`;
    rowsHtml += `
      <div class="p-record">
        <div class="p-record-title">${i+1}. ${netTag}${escapeHtml(r.datetime)}　${escapeHtml(r.faultType)}</div>
        <div class="p-meta">${escapeHtml(metaLine)}</div>
        <div class="p-raw">原始簡訊：${escapeHtml(r.raw)}</div>
        <div class="p-fix-label">修復方式：</div>
        <div class="p-fix">${r.fix ? escapeHtml(r.fix) : '（尚未填寫）'}</div>
      </div>`;
  });

  const printHtml = `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(st.siteName)} - 障礙派工歷史紀錄</title>
<style>
  body{ font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; color:#1c1f1a; padding:24px; }
  h1{ font-size:1.4rem; margin:0 0 4px; border-bottom:2px solid #1c1f1a; padding-bottom:8px; }
  .p-code{ font-family:monospace; font-size:0.85rem; color:#666; margin-bottom:4px; }
  .p-meta-top{ font-size:0.8rem; color:#888; margin-bottom:16px; }
  .p-record{ margin-bottom:18px; padding-bottom:12px; border-bottom:1px dashed #ccc; page-break-inside: avoid; }
  .p-record-title{ font-weight:700; font-size:1rem; margin-bottom:4px; }
  .p-meta{ font-size:0.85rem; color:#5c6b4f; margin-bottom:4px; }
  .p-raw{ font-family:monospace; font-size:0.78rem; color:#666; background:#f6f5ef; padding:6px 8px; border-radius:4px; margin-bottom:6px; word-break:break-all; }
  .p-fix-label{ font-weight:700; font-size:0.85rem; margin-top:4px; }
  .p-fix{ font-size:0.88rem; white-space:pre-wrap; margin-top:2px; line-height:1.6; }
  .p-toolbar{
    position:sticky; top:0; background:#f6f5ef; padding:10px 0 14px;
    margin-bottom:10px; border-bottom:1px solid #d8d6cb;
    display:flex; gap:10px;
  }
  .p-btn{
    padding:10px 18px; border-radius:6px; font-weight:700; font-size:0.9rem;
    border:1px solid #1c1f1a; cursor:pointer; background:#1c1f1a; color:#f6f5ef;
    font-family:inherit;
  }
  .p-btn.outline{ background:none; color:#1c1f1a; }
  @media print{
    body{ padding:10mm; }
    .p-toolbar{ display:none; }
  }
</style>
</head>
<body>
  <div class="p-toolbar">
    <button class="p-btn outline" onclick="window.close()">← 返回</button>
    <button class="p-btn" onclick="window.print()">列印 / 存為 PDF</button>
  </div>
  <h1>${escapeHtml(st.siteName)}　障礙派工歷史紀錄</h1>
  <div class="p-code">站碼：${escapeHtml(st.siteCode||'-')}　／　${escapeHtml(st.siteCodeName||'-')}</div>
  <div class="p-meta-top">共 ${st.records.length} 筆紀錄　／　列印時間：${printedAt}　／　基站隨身參謀 - 王志光 高級工程師 設計</div>
  ${rowsHtml}
</body>
</html>`;

  const win = window.open('', '_blank');
  if(!win){
    alert('無法開啟列印視窗，請允許彈出視窗權限');
    return;
  }
  win.document.open();
  win.document.write(printHtml);
  win.document.close();
  win.onload = ()=>{
    win.focus();
    win.print();
  };
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='search'){
      renderStationList(searchBox.value.trim());
    }
    if(btn.dataset.tab==='data'){
      renderStats();
    }
  });
});

// ---------- 資料管理 ----------
function renderStats(){
  const stCount = Object.keys(db.stations).length;
  let recCount = 0, fixCount=0;
  Object.values(db.stations).forEach(st=>{
    recCount += st.records.length;
    fixCount += st.records.filter(r=>r.fix).length;
  });
  document.getElementById('statsBox').innerHTML =
    `基站數：${stCount}　／　障礙紀錄數：${recCount}　／　已填修復方式：${fixCount}`;
}

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const rows = [];
  Object.values(db.stations).forEach(st=>{
    st.records.forEach(r=>{
      rows.push({
        '站名': st.siteName,
        '站碼': st.siteCode || '',
        '站碼別名': st.siteAlias || '',
        '代碼站名': st.siteCodeName || '',
        '網路': r.network || '',
        '時間': r.datetime || '',
        '障礙類型': r.faultType || '',
        '派工人員': r.worker || '',
        '障礙編號': r.orderNo || '',
        '障礙描述': r.description || '',
        '修復方式': r.fix || '',
        '原始簡訊': r.raw || '',
        '紀錄ID': r.id || ''
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:14},{wch:10},{wch:10},{wch:18},{wch:6},
    {wch:12},{wch:14},{wch:10},{wch:10},{wch:24},
    {wch:30},{wch:50},{wch:30}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '查修紀錄');

  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `基站隨身參謀_${ts}.xlsx`);
});

document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(rows.length===0) throw new Error('沒有資料');

      let added=0, skipped=0;
      rows.forEach(row=>{
        const siteName = String(row['站名']||'').trim();
        const datetime = String(row['時間']||'').trim();
        const faultType = String(row['障礙類型']||'').trim();
        if(!siteName || !datetime) return;

        const key = siteName;
        if(!db.stations[key]){
          db.stations[key] = {
            siteName,
            siteCode: String(row['站碼']||''),
            siteAlias: String(row['站碼別名']||''),
            siteCodeName: String(row['代碼站名']||''),
            records: []
          };
        }
        if(row['站碼']) db.stations[key].siteCode = String(row['站碼']);
        if(row['站碼別名']) db.stations[key].siteAlias = String(row['站碼別名']);
        if(row['代碼站名']) db.stations[key].siteCodeName = String(row['代碼站名']);

        const id = String(row['紀錄ID']||'') || (db.stations[key].siteCode + '_' + datetime + '_' + faultType);
        const exists = db.stations[key].records.find(rec=>rec.id===id);
        if(exists){
          // 已存在：更新修復方式（允許用 Excel 補登）
          const fixVal = String(row['修復方式']||'').trim();
          if(fixVal && fixVal !== exists.fix){
            exists.fix = fixVal;
          }
          skipped++;
          return;
        }
        db.stations[key].records.push({
          id,
          datetime,
          faultType,
          network: String(row['網路']||''),
          worker: String(row['派工人員']||''),
          orderNo: String(row['障礙編號']||''),
          description: String(row['障礙描述']||''),
          raw: String(row['原始簡訊']||''),
          fix: String(row['修復方式']||'')
        });
        added++;
      });

      Object.values(db.stations).forEach(st=>{
        st.records.sort((a,b)=> compareDatetime(b.datetime, a.datetime));
      });
      saveDB(db);
      renderStats();
      alert(`匯入完成：新增 ${added} 筆，略過/更新 ${skipped} 筆`);
    }catch(err){
      alert('匯入失敗：檔案格式不正確（' + err.message + '）');
    }
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(confirm('確定要清除所有資料嗎？此操作無法復原，建議先匯出備份。')){
    db = { stations: {} };
    saveDB(db);
    renderStats();
    alert('已清除所有資料');
  }
});

// ---------- 初始化 ----------
function updateClock(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const weekDays = ['日','一','二','三','四','五','六'];
  const text = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}（${weekDays[now.getDay()]}）${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('liveClock').textContent = text;
}
updateClock();
setInterval(updateClock, 1000*30);

renderStationList();
renderStats();
</script>
